<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 128" role="img" aria-labelledby="title desc">
  <title id="title">Battery Level Card Icon</title>
  <desc id="desc">A rounded battery icon with a green to yellow fill and a battery tip, matching the style of the Battery Level Card.</desc>
  <defs>
    <linearGradient id="batteryFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="45%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="256" height="128" rx="28" fill="#f8fafc"/>
  <g filter="url(#shadow)">
    <rect x="28" y="28" width="180" height="72" rx="14" fill="#ffffff" stroke="#0f172a" stroke-width="8"/>
    <rect x="42" y="42" width="122" height="44" rx="8" fill="url(#batteryFill)"/>
    <rect x="210" y="50" width="18" height="28" rx="4" fill="#0f172a"/>
  </g>
  <text x="103" y="71" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">72%</text>
</svg>